<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Presenças - Ministério de Louvor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%); min-height: 100vh; padding: 1.5rem; color: #ede9fe; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .logo-circle { width: 56px; height: 56px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #7c3aed, #2d1b4e); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; font-size: 24px; font-weight: 700; color: #ede9fe; box-shadow: 0 4px 20px rgba(124,58,237,0.5); }
  h1 { font-size: 22px; font-weight: 700; color: #ede9fe; }
  .subtitle { color: #a78bfa; font-size: 14px; margin-top: 4px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 700; color: #c4b5fd; }
  .stat-label { font-size: 11px; color: #a78bfa; margin-top: 4px; }
  .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid rgba(124,58,237,0.3); background: rgba(124,58,237,0.1); color: #c4b5fd; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover, .filter-btn.active { background: rgba(124,58,237,0.4); border-color: #7c3aed; color: #fff; }
  .search-input { padding: 8px 14px; border-radius: 20px; border: 1.5px solid rgba(124,58,237,0.3); background: rgba(255,255,255,0.05); color: #ede9fe; font-size: 13px; outline: none; font-family: inherit; min-width: 180px; }
  .search-input::placeholder { color: #6d5a8a; }
  .search-input:focus { border-color: #7c3aed; }
  .update-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid rgba(124,58,237,0.3); background: rgba(124,58,237,0.1); color: #c4b5fd; font-size: 13px; cursor: pointer; font-family: inherit; margin-left: auto; }
  .update-btn:hover { background: rgba(124,58,237,0.3); }
  .table-wrap { background: rgba(255,255,255,0.04); border: 1px solid rgba(124,58,237,0.2); border-radius: 14px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead { background: rgba(124,58,237,0.2); }
  th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 11px 14px; font-size: 13px; border-top: 1px solid rgba(124,58,237,0.1); white-space: nowrap; }
  tr:hover td { background: rgba(124,58,237,0.08); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge.ativo { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .badge.novo { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .badge.verificar { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .badge.excluido { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .pct-bar { display: flex; align-items: center; gap: 8px; }
  .bar-track { width: 80px; height: 6px; background: rgba(124,58,237,0.15); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .loading { text-align: center; padding: 3rem; color: #a78bfa; font-size: 15px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: #a78bfa; font-size: 13px; text-decoration: none; margin-bottom: 1.5rem; }
  .back-link:hover { color: #ede9fe; }
  .links-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .link-badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; text-decoration: none; border: 1px solid rgba(124,58,237,0.4); color: #c4b5fd; background: rgba(124,58,237,0.1); transition: all 0.15s; }
  .link-badge:hover { background: rgba(124,58,237,0.3); color: #fff; }
</style>
</head>
<body>
<div class="container">
  <a href="#" class="back-link">← Voltar ao registro</a>
  <div class="header">
    <div class="logo-circle">c</div>
    <h1>Painel de Presenças</h1>
    <p class="subtitle">Ministério de Louvor · Central SP</p>
    <div class="links-row">
      <a href="presenca_manha.html" class="link-badge">🌅 Link Manhã</a>
      <a href="presenca_tarde.html" class="link-badge">🌆 Link Tarde</a>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-num" id="statTotal">–</div><div class="stat-label">Participantes ativos</div></div>
    <div class="stat-card"><div class="stat-num" id="statSabados">–</div><div class="stat-label">Sábados registrados</div></div>
    <div class="stat-card"><div class="stat-num" id="statVerificar">–</div><div class="stat-label">⚠ Verificar</div></div>
    <div class="stat-card"><div class="stat-num" id="statNovos">–</div><div class="stat-label">🆕 Novos</div></div>
    <div class="stat-card"><div class="stat-num" id="statMedia">–</div><div class="stat-label">Média geral</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos',this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('ativo',this)">✅ Ativos</button>
    <button class="filter-btn" onclick="filtrar('novo',this)">🆕 Novos</button>
    <button class="filter-btn" onclick="filtrar('verificar',this)">⚠ Verificar</button>
    <button class="filter-btn" onclick="filtrar('excluído',this)">❌ Excluídos</button>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar nome..." oninput="aplicarFiltros()" />
    <button class="update-btn" onclick="carregarPainel()">↻ Atualizar</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loadingMsg">⏳ Carregando dados...</div>
    <table id="tabela" style="display:none;">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Status</th>
          <th>☀ Manhã</th>
          <th>🌆 Tarde</th>
          <th>Total</th>
          <th>% Presença</th>
          <th>Último sábado</th>
          <th>Ausências seguidas</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwj0qtxujITFQQgBeUMjR5Y3d9nWJiXCh8TrU4z1B0g7eZ_lCqyM7MW43mtDI1gfm4j/exec";
let todosOsDados = [];
let filtroAtual = "todos";

async function carregarPainel() {
  document.getElementById("loadingMsg").style.display = "block";
  document.getElementById("tabela").style.display = "none";
  try {
    const resp = await fetch(SCRIPT_URL + "?action=painel");
    const data = await resp.json();
    todosOsDados = data.participantes || [];
    atualizarStats(data);
    aplicarFiltros();
  } catch(e) {
    document.getElementById("loadingMsg").textContent = "❌ Erro ao carregar dados.";
  }
}

function atualizarStats(data) {
  const ativos = todosOsDados.filter(p => p.status !== "Excluído");
  const verificar = todosOsDados.filter(p => p.status === "Verificar");
  const novos = todosOsDados.filter(p => p.status === "Novo");
  const medias = ativos.filter(p => p.totalSabados > 0).map(p => p.percentual);
  const media = medias.length ? Math.round(medias.reduce((a,b)=>a+b,0)/medias.length) : 0;
  document.getElementById("statTotal").textContent = ativos.length;
  document.getElementById("statSabados").textContent = data.totalSabados || 0;
  document.getElementById("statVerificar").textContent = verificar.length;
  document.getElementById("statNovos").textContent = novos.length;
  document.getElementById("statMedia").textContent = media + "%";
}

function corBarra(pct) {
  if (pct >= 80) return { fill: "linear-gradient(90deg,#10b981,#6ee7b7)", txt: "#6ee7b7" };
  if (pct >= 60) return { fill: "linear-gradient(90deg,#7c3aed,#a78bfa)", txt: "#c4b5fd" };
  if (pct >= 40) return { fill: "linear-gradient(90deg,#f59e0b,#fcd34d)", txt: "#fcd34d" };
  return { fill: "linear-gradient(90deg,#ef4444,#fca5a5)", txt: "#fca5a5" };
}

const statusBadge = {
  "Ativo": '<span class="badge ativo">✅ Ativo</span>',
  "Novo": '<span class="badge novo">🆕 Novo</span>',
  "Verificar": '<span class="badge verificar">⚠ Verificar</span>',
  "Excluído": '<span class="badge excluido">❌ Excluído</span>'
};

function renderizar(dados) {
  const tbody = document.getElementById("tbody");
  if (!dados.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#6d5a8a;padding:2rem;">Nenhum participante encontrado.</td></tr>`;
  } else {
    tbody.innerHTML = dados.map(p => {
      const pct = Math.round(p.percentual);
      const c = corBarra(pct);
      const ausColor = p.ausenciaseguidas >= 8 ? "#fca5a5" : p.ausenciaseguidas >= 4 ? "#fcd34d" : "#6ee7b7";
      return `<tr>
        <td style="font-weight:500;color:#ede9fe;">${p.nome}</td>
        <td>${statusBadge[p.status] || p.status}</td>
        <td style="color:#c4b5fd;">${p.presencasManha}</td>
        <td style="color:#c4b5fd;">${p.presencasTarde}</td>
        <td style="color:#ede9fe;font-weight:600;">${p.totalPresencas}/${p.totalSabados}</td>
        <td>
          <div class="pct-bar">
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.fill}"></div></div>
            <span style="color:${c.txt};font-weight:600;min-width:34px;">${pct}%</span>
          </div>
        </td>
        <td style="color:#a78bfa;">${p.ultimoSabado || "–"}</td>
        <td style="text-align:center;color:${ausColor};font-weight:600;">${p.ausenciaseguidas}</td>
      </tr>`;
    }).join("");
  }
  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("tabela").style.display = "table";
}

function filtrar(tipo, btn) {
  filtroAtual = tipo;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  aplicarFiltros();
}

function aplicarFiltros() {
  const busca = document.getElementById("searchInput").value.toLowerCase();
  let filtrados = todosOsDados;
  if (filtroAtual !== "todos") filtrados = filtrados.filter(p => p.status.toLowerCase() === filtroAtual);
  if (busca) filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(busca));
  renderizar(filtrados);
}

carregarPainel();
</script>
</body>
</html>
